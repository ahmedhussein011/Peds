        // ----- raw data from PDF (pages 1-65) -----
        const rawCases = [
            { system: "Neurology", text: "4-year-old boy's parents complain that their child has difficulty walking. The child rolled, sat and first stood at normal ages and first walked at 13 months of age. Over the past several months however, the family has noticed an increase inward curvature of the lower spine as he walks and that his gait has become more waddling. On examination, the child is oriented and interactive with the physician with an average body built. Enlargement of his calves has been noticed." },
            { system: "Nephrology", text: "4-years-old boy presents with a 2 weeks history of general malaise and puffiness of the face. There is nothing of note in the history. Examination reveals generalized puffiness with pitting edema of the lower limbs. There is mid abdominal distention, but no tenderness or organomegaly. his scrotum appears swollen. His B.P is 90/65 mmHg." },
            { system: "Nutrition", text: "A mother brings her 14-month-old boy because he is not well. She observed that her child has recently lost his appetite and became disinterested in playing. The mother says that she got another baby 3 weeks ago, and in the last 2 months, she stopped breastfeeding her older child and started to give him mashed potatoes cooked rice with some added sugar and boiled macaroni. On examination, the child looks distressed, coughing with cyanosis and grunting but he is not feverish. His weight is 8 Kg. His temp is 36.3 C and his respiratory rate is 60 breaths/m. He looks edematous with sparse light color. His lips are pale." },
            { system: "GIT", text: "7 weeks old infant presents to the emergency department with 1 week history of nonbillious vomiting. His mother describes the vomit as very forceful. He has a good appetite but has lost 300 gm since he was last weighed a week earlier. He has mild constipation. On examination he is mildly dehydrated, his pulse is 170 beats/m, blood pressure 82/43 mm Hg and peripheral capillary refill 2 seconds. An olive like mass is felt in the right upper quadrant of the abdomen." },
            { system: "Hematology", text: "4-year-old girl is referred to the pediatric unit with pallor and non- blanching skin rash. She had a cold and sore throat 2 weeks previously. She is otherwise very well. On examination she has no dysmorphic features. Her height and weight are on the 25th centiles. There is no jaundice and she is afebrile. She is pale and clinically anemic There are petechiae mainly on her limbs. No hepatosplenomegaly no enlarged L.N." },
            { system: "GIT", text: "A 9 months old male infant is brought to the emergency department by his mother with a 4-days history of vomiting and diarrhea. On examination, respiratory rate is 45/m unlabored. Proximal pulses are poor, distal pulses are absent and extremities are cool. Capillary refill is 8 sec. HR is 185 /m and BP is 85/40. The infant is extremely lethargic and responds to pain only, with a minimal grimace." },
            { system: "Cardiology", text: "A 5 hours old male newborn on the postnatal ward is noticed to be blue around the lips and tongue. The baby was born by normal vaginal delivery and weighted 3.8 kg. The APGAR SCORES were 7 at 1 minute and 8 at 5 min. On examination the temp is 36.6 C, his lips tongue and extremities are cyanosed. He is crying normally. Heart rate is 160 /m femoral pulses are palpable and second heart sound is single, oxygen saturation is 70% in air and does not rise with oxygen mask." },
            { system: "Hepatology", text: "12-year-old boy is brought to the clinic by his parents He has been complaining of mild abdominal pain and his parents noticed that the sclera looked yellow. He has been scratching himself mildly. The parents report that he had flu like illness with fever nausea and poor appetite over the last 10 days. He has previously been healthy, but he went to a summer camp 5 weeks previously on examination he is jaundiced and appears uncomfortable but alert and fully oriented. His temp is 37.8 C and his liver is palpable 4 cm below the costal margin and mildly tender." },
            { system: "Infection", text: "4-years-old boy is brought by his parents to the pediatric clinic with mild fever and a few small blisters on the shoulder and chest. The parents state that fever was noted for 1 day, and then the skin lesions appeared. These lesions began as tiny papules which progressed rapidly to vesicles. On examination, he has a widespread skin rash at different stages, the rash is more concentrated on the trunk than the limbs. The parents report that that have been several other children with similar lesions at his school." },
            { system: "GIT", text: "7-year-old child is brought to the pediatrician with complaints of chronic abdominal pain, bloating, and occasional diarrhea. The parents report that the child has experienced a noticeable decline in growth, and they have observed pale, foul- smelling stools. Physical examination reveals a distended abdomen with decreased muscle mass. Laboratory tests indicate a low serum iron level and anemia. The child's diet is reportedly rich in wheat based." },
            { system: "Cardiology", text: "An 8 year old boy being followed up in the cardiology clinic has a 3 week history of low grade fever of unknown source, fatigue, weight loss, myalgia, and headache. On repeated examination, he is found to have developed a murmur, petechiae and mild splenomegaly." },
            { system: "Respiratory", text: "12-year-old boy is referred by his GP with a chronic nocturnal cough. He has been losing weight and has had a poor appetite 3 months ago. He lies with his mother and three younger siblings in a damp two bed room flat and his mother has also been coughing a lot over the last month with occasional blood- tinged sputum. They are uncertain which immunizations he has received. On examination, he is very thin and his weight is on the 3rd percentile. His heart rate is 80 /m and his respiratory rate is 26 breaths /m. There is no wheeze but there are bronchial breath sounds in the right upper zone of his chest." },
            { system: "Nephrology", text: "An 8-year-old boy wets the bed most nights, does not walk up when it happens and there is a large pool of urine. He has no previous medical problems and no recent illness. On examination, his height is 140 cm (75th centile) and his weight is 35 kg (75th centile). His blood pressure is 112/70 mmHg. Cardiovascular, respiratory and abdominal examinations are unremarkable." },
            { system: "Endocrine", text: "The mother of a 2-week-old infant reports that since birth her infant sleeps most of the baby; she has to awaken her every 4 hours to feed, and she will take only an ounce of formula at a time. She also is concerned that the infant has persistently hard pellet like stools On examination, you find an infant with normal weight and length, but with an enlarged head. The heart rate is 75 beats/m and the temp is 36 C the child is still jaundiced. You note large anterior and posterior fontanelle, a distended abdomen and an umbilical hernia." },
            { system: "Respiratory", text: "A 9 year old boy is seen in the emergency department. This is his third attendance with an acute wheeze in the 3 months. He has developed a cold and became acutely breathless. On examination, he is quite but able to answer questions with short sentences. His chest is hyper inflated and he is using his accessory muscles of respiration. On auscultation there is equal but poor air entry with widespread expiratory wheeze. His pulse is 125 /m with good perfusion." },
            { system: "Nephrology", text: "5-year-old girl has been passing urine frequently for the last 2 days and complaining of pain when doing so. She is febrile and had an episode of shivering. SHE HAS ALSO complained of pain in her lower back and has vomited three times today. On examination her temp is 39.1, her abdomen feels soft and is not distended, but there is significant discomfort when palpating right loin." },
            { system: "Neonatology", text: "An infant is born at 42 weeks' gestation body weight is 4900g. respiratory difficulty developed immediately after birth and was progressively increasing. Skin and nails were stained with yellow color. The infant's respiratory rate is 70/min. examination reveals grunting, retraction and cyanosis in room air. History of diminished fetal movements during the last few weeks." },
            { system: "Hematology", text: "A 5-year-old girl is referred to the pediatric clinic because of pallor and progressive abdominal distention with a history of repeated blood transfusion since the age of 6 months. On examination she appears pale and she has yellow sclera. Her heart rate is 105/m. Her height and weight are below the 5th centile. She has a grade 2/6 ejection systolic murmur at the left sternal edge she has HSM, BUT NO PURPURA OR GENERALIZED LYMPHADENOPATHY." },
            { system: "GIT", text: "7 months old infant was referred with a 2-days history of diarrhea with blood and mucous in the stools. His mother states that he has periods of inconsolable crying which are getting worse and more frequent. There is no history of contact with gastroenteritis, of travel, or of bleeding disorders. On examination he has a temp of 37.9 his pulse rate 186/m, blood pressure is 80/44 and capillary refill is 3 seconds. He is difficult to examine due to frequent crying. But when examined during a period of quiet, a sausage- like mass is felt on the right side of the abdomen." },
            { system: "Hematology", text: "2-year-old previously well boy is brought to the office by his aunt. She reports that he developed pallor and red urine and jaundice over the past few days. He has not been exposed to a jaundiced person, but he is talking Sulphamethoxazole- trimethoprim for otitis media His aunt seems to recall his 4-year-old brother having had similar problem after a viral illness, which also caused a short- lived period of anemia and jaundice." },
            { system: "Hepatology", text: "2-year-old girl was brought to the emergency department with sudden severe hematemesis. History revealed umbilical sepsis during neonatal period. The child appears pale and physical examination reveals a firm spleen palpable 7 cm below costal margin. She does not exhibit hepatomegaly ascites or lymphadenopathy Laboratory findings show a hemoglobin level of 6 gm/dl." },
            { system: "Cardiology", text: "An infant 11 months old presenting with bluish discoloration noticed by the mother 3 months ago. There is history of feeding difficulties, exertional dyspnea and recurrent attacks of cyanotic spells where the baby becomes more cyanosed with marked tachypnea. She becomes more cyanosed following crying. Examination revealed central cyanosis, and ejection systolic murmur over the 2nd left Space/ left sternal border." },
            { system: "Hematology", text: "7-year-old girl presents with a 3 days history of rash and ankle swelling and painless frank hematuria. She had a cold 4 weeks previously, but has otherwise been healthy She received no medications and is fully immunized. On examination, she has palpabl non blanching purple spots 1-4 mm in diameter especially over the shins and buttock. Her left ankle is swollen, worm and tender with restricted movement." },
            { system: "Rheumatology", text: "For the past 6 weeks, a 3-year-old girl was increasingly reluctant to get up in the morning and feel stiff all over. Her stiffness improves after few house, on examination both knees and her right ankle are mildly swollen and feel warm to touch. But there are no overlying skin changes. There is pain and decreased range of movements. There are similar findings in the proximal interphalangeal joint of the left index finger (swollen, tender, with limited mobility)." },
            { system: "Neonatology", text: "A 3 day old infant presents with the complaint of yellowish skin. Both the mother and the baby have O +ve blood. The baby's direct serum bilirubin is 0.2 mg/dl. With a total serum bilirubin of 11.8 mg/dl. The hemoglobin is 17 gm/dl. Platelets count is 278,000/ul. Reticulocyte count is 1.5%. the peripheral smear doesn't show abnormalities." },
            { system: "ER", text: "2-year-old girl had a running nose for 2 days, a cough for 1 day and developed noisy breathing 3 hours ago. Her father had a cold the previous week. On examination, her temp is 38; there is a loudly noisy breathing, mainly on inspiration and a barking cough. Her respiratory rate is 40/m with suprasternal and substernal recessions. On auscultation, there are no cracks or wheeze." },
            { system: "Hepatology", text: "4 weeks old full-term female presents to the office with increasing jaundice over the last week. Her parents' report that 2 weeks previously, she began to have yellow eyes and skin her stools is clay in color for the past 10 days along with dark urine. There were no complications noted at birth. On examination her weight and height are at the 50th percentile. Her skin is jaundiced with scleral icterus. Her liver is felt 4 cm below the costal margin firm in consistency and no splenomegaly is noted." },
            { system: "Infection", text: "2-years-old boy is referred with a history of fever cough, runny nose and sticky eyes for 6 days. On examination, his temp is 38.5 C. he is miserable and lethargic. He has a wide spread maculopapular erythematosus rash, which is coalescing over the face, neck and trunk. There is no respiratory distress but he is coughing. His nose is streaming with catarrh and he has exudative conjunctivitis. He had not received all his childhood immunizations due to parental concerns regarding vaccine safety." },
            { system: "Neurology", text: "7-year-old boy is brought to the emergency department by his parents due to progressive weakness in his legs over the past two days. The child was completely healthy until two days ago when he started having difficulty walking. Weakness began in his feet and progressively moved up to his thighs. He complains of tingling sensations in his fingers and toes. Parents report that he had a viral illness (fever, cough, and runny nose) about 10 days ago, which resolved." },
            { system: "Neurology", text: "15 months old boy presents with seizures associated with fever. He has been in good health except for a high fever that developed today to about 38.8 C. He has slight cough and mild nasal congestion Just prior to the seizures he was playing with some toys. Past medical history is unremarkable. Examination shows congested throat mucosa, congested ear drums and normal neurological examination." },
            { system: "Nutrition", text: "A mother brings her 12 months old boy because he is always crying. She observed that her child is wasted and looks markedly wasted. On examination, the child is crying most of the time he looks very thin and wasted. His weight is 6.5 kg His lips look pale with macerated mouth angles. Subcutaneous fat is lost over the abdomen, buttocks, with senile face. Chest examination reveals scattered rales and crepitations all over the chest." },
            { system: "Growth", text: "7-year-old boy is brought to the pediatric clinic by his parents due to concerns about his short height compared to his peers. His height is below the 3rd percentile, while his weight is at the 10th percentile for age. His parents report that he has always been the shortest in his class but is otherwise active and playful. His appetite is normal, and there are no complaints of abdominal pain, diarrhea, or recurrent infections - His mother reached puberty at 16 years, and his father at 17 years. His birth history was unremarkable, with a normal birth weight and no neonatal complications. On examination: He has proportionate short stature with no dysmorphic features. but Bone age X- ray shows a delay of 2 years compared to chronological age." },
            { system: "Rheumatology", text: "9-year-old girl has a raised erythematous rash on the cheeks: pleural effusion and tenderness of the small Joints of the hands: with history of recurrent mouth and nasal ulcers, urine analysis shows proteinuria. Or An 11-year-old girl presents with painful knees. She has had intermittent episodes of fever associated with myalgia and arthralgia. Over the past 5 months she lost weight and suffered from alopecia. Recently she was found to has a malar facial rash." },
            { system: "Hematology", text: "2 years old child develops bruising and generalized petechie two weeks after a viral syndrome. No HSM or lymph node enlargement is noted. The examination is otherwise unremarkable Laboratory testing shows the patent to have a normal Hb, Hematocrit and white cell count and differential. The platelet count is 15,000." },
            { system: "Infection", text: "9 months old boy is brought by his parents because of fever for 5 days He has been slightly irritable and feeling less than usual. His temperature measure at home has been up to 40 C He looks quite well but his temp remains raised and no focus can be found. He is admitted to the ward overnight for observation and his temp subsides. On the morning ward round, he is found to have an erythematosus macular rash on his trunk." },
            { system: "Neurology", text: "A 13-month-old girl presents to the emergency department with a 2-days history of lowgrade fever runny nose and increasing fussiness. SHE ALSO DEVELOPED A PETECHIAL RASH AND VOMITING. On examination, her temp is 39.6 C, heart rate is 170/m. Respiratory rate is 50/m and blood pressure is 80/50. Her extremities are mottled and her capillary refill is 4 seconds. While trying to obtain an IV access, the infant becomes more lethargic and her blood pressure drops further." },
            { system: "Neurology", text: "A 9-year-old boy presents in a confused state. He developed a fever 2 day previously. And had been complaining of headache, fever and photophobia. He had vomited once. Previous history was unremarkable on examination, his temp was 38 C and he has mild neck stiffness and photophobia. Heart rate is 82 beats/m and respiratory rate is 16 breaths/m. there are no other focal signs of infection." },
            { system: "GIT", text: "1 year old girl has had diarrhea and non- bilious vomiting for 2 days. In the fast 8 hours. He vomited 5 times and passed 6 liquid stools. The infant passed a very little amount of urine during the last day. On examination, HR is 135/m, respiratory rate is 45/m, his temp is 37.7 and his capillary refill time is less than 2 seconds. His anterior fontanelle is depressed; eyes are sunken, skin pinch returns back slowly." },

            { system: "GIT", text: "3-day-old infant presents with rapid breathing, retractions, and cyanosis. Physical examination reveals diminished breath sounds on the left side and a scaphoid abdomen. The infant's condition worsens despite oxygen therapy. Which of the following abnormalities is most likely contributing to the respiratory distress?" },
            { system: "Genetics", text: "13-year-old girl presents to your clinic for evaluation of short stature. The patient has not yet attained menarche and her mother reports no breast development. She has been well with no chronic medical problems. Her mother is 173 cm and had menarche at age of 12. Her father is 185 cm and started shaving at age of 15 years. On examination her height is 120 cm less than 5th centile she is pre pubertal, has a webbed neck and widely spaced nipples the carrying angle is increased." },
            { system: "Neonatology", text: "A term female infant was born to a 28-years-old mother by CS after an obstructed labor. Apgar scores were 3 and 4 at 1 and 5 minutes, respectively. She required vigorous resuscitation at birth and was admitted to the NICU under observation. She developed generalized tonic clonic seizures 10 hours after delivery. On examination her tern was 36.8 C heart rate was 140/m and respiratory rate 60/m she is no respiratory distress but she is sleepy. Head shoes mild molding. There is generalized hypotonia. Blood sugar and calcium were normal." },
            { system: "Cardiology", text: "3 months old boy presents with poor feeding, excessive sweating during feeding, and poor growth. On examination his respiratory rate is 80/minute, and blood pressure is 90/65 mmHg in the upper and lower extremities and the heart rate is 180 per minute. The cardiac exam reveals a systolic thrill and a grade 4 pansystolic murmur at the left sternal border." },
            { system: "Neonatology", text: "4-day-old full-term infant is referred to the pediatric outpatient clinic by his GP because of jaundice. This is the first baby of a 22-year-old mother His mother states that the jaundice started within the first 24 hours of life, His birth weight was 3.7 kg on Examination the sclera is yellow and the jaundice is extending to the palm and soles. There are no other signs." },
            { system: "Respiratory", text: "5 months old boy developed a runny nose and a cough 2 days previously, but has become progressively and has now gone off his feeds. He has two older siblings who also have colds. On examination, he is febrile. 37.8, has clear nasal secretion and dry wheezy cough. His respiratory rate is 65 /m with intercostal and subcostal retraction. On auscultation, there are widespread fine crackles and expiratory wheezes." },
            { system: "Respiratory", text: "3 years old girl presented 4 days previously with a cough and fever and was diagnosed with viral upper respiratory tract infection. On examination, she is febrile 38.8 with capillary refill of 2 seconds. Her pulse is 140/m, oxygen saturation is 85% in air and BP is 85/60. Her respiratory rate is 48/m with nasal flaring. There is dullness to percussion in the right lower zone post. With decreased breath sounds and bronchial breathing. Oxygen saturation is given, however respiratory distress worsens (RR more than 60/m, severe Intercostal recession. She becomes cyanosed and lethargic." },
            { system: "ER", text: "12 years old boy is brought to the emergency department after being stung by a bee. He initially complained of localized pain and swelling. Fifteen minutes later, he began to complain of shortness of breath and wheezed. He felt weak and dizzy. On examination, he is drowsy and pale, and in mild respiratory distress, he has generalized urticaria. His lung examination shows mild wheezing with minimal retractions." },
            { system: "Respiratory", text: "3-year-old boy was seen because of a cough and fever and was diagnosed as having a viral upper respiratory tract infection. On examination, he miserable, flushed, toxic and febrile 38.8 C. His pulse is 140 beats/m His respiratory rate is 48 breath/m with nasal flaring. There is dullness to percussion in the right lower zone post. With decreased breath sounds and bronchial breathing." },
            { system: "Neonatology", text: "A 23-years-old lady in her first pregnancy is admitted to hospital at 29 weeks gestation because she has had spontaneous rupture of membranes. Forty-eight hours later she goes into spontaneous labor and a baby boy is delivered weighing 900 gm Two hours after delivery. He develops marked subcostal and sternal recession with audible grunting." },
            { system: "Rheumatology", text: "Five years old boy presented to you by an acute onset of difficulty in breathing and effort intolerance of two days duration. The mother gave history of persistent high fever that lasted for 4 days one week ago, associated with redness of the eyes, mouth and body rash. On presentation of the child was dyspnic RR 40/min, tachycardic 140 beats/min, pale and the liver was 4 cm below the costal margin and tender. Peripheral perfusion was mildly impaired. There was perianual peeling. On cardiac auscultation, there was apical soft systolic murmur. Chest X ray revealed cardiomegaly." },
            { system: "Infection", text: "7-years-old boy presents with fever, sore throat and a fine maculopapular rash for 2 days. On examination, he has enlarged erythematosus tonsils with exudates, enlarged tender cervical lymph nodes and a strawberry tongue. A diffuse blanching rash with a rough texture to touch is noted." },
            { system: "Hematology", text: "An 18-month-old boy presents with a chief complaint of pallor. He is a picky eater taking small amounts of meat and some vegetables; he survives mainly on bottles of milk. On examination. He looks pale but not icteric. He is an active toddler. His heart rate is 100/m and he has grade 2/6 ejection murmur at the left sternal edge." },
            { system: "Neonatology", text: "A term 4200 gm female infant was delivered by CS because cephalopelvic disproportion. The amniotic fluid was clear, and the infant cried almost immediately after birth. Within the first 15 minutes of life, however the infant's respiratory rate increased to 70 breath/minute, and she began to have mild chest retractions and intermittent grunting respirations. The infant was transferred to neonatal unit. On admission, chest examination showed bilateral fair air entry." },
            { system: "Nutrition", text: "1.5-year-old boy presents with abnormal gait and poor weight gain. He was breast fed for the first year without any other supplementation. On examination, he is pale with prominent forehead and a marked abdominal distension. He has small chest swellings. His length is on the 25th centile and his weight on the 10th centile. The hand and foot show abnormal fixed position. And the child started to Convulse." },
            { system: "Hematology", text: "3-year-old boy fell while playing in the garden; he developed a very painful swelling of the right knee. He was born at 37 weeks gestation and experienced a prolonged bleeding after circumcision that necessitated an urgent blood transfusion. A family history of bleeding tendency is reported." },
            { system: "Genetics", text: "3-days old female infant is referred from a community hospital for bilious vomiting and a heart murmur. The baby was born at 37 weeks gestation to 39-year-old women. On examination, he appears jaundiced and has a flat facial profile, short upward slanting, flat nasal bridge with epicanthal folds; a small mouth with protruding tongue and single palmer crease. A loud holosystolic murmur is heard over the chest. Generalized hypotonia is present." },
            { system: "Respiratory", text: "12-year-old boy is referred by his GP with a chronic nocturnal cough. He has been losing weight and has had a poor appetite 3 months ago. He lies with his mother and three younger siblings in a damp two bed room flat and his mother has also been coughing a lot over the last month with occasional blood- tinged sputum. They are uncertain which immunizations he has received. On examination, he is very thin and his weight is on the 3rd percentile. His heart rate is 80 /m and his respiratory rate is 26 breaths /m. There is no wheeze but there are bronchial breath sounds in the right upper zone of his chest." },
            { system: "Nephrology", text: "5-year-old boy presents with a 3-days history of smoky colored urine. This is not associated with dysuria, although his urine output is diminished. He had tonsillitis 4 weeks previously. There is no family history of note. On examination, he is paraxial and well. Respiratory rate is 14 /m and pulse is 90/m with a blood pressure of 110/85 mmHg. Abdomen is non- tender with no masses." },
            { system: "Cardiology", text: "A 10-year-old boy presents with fever and joint pains, initially the pain affected his right wrist, but now affects his left wrist and right ankle. He had tonsillitis 4 weeks previously treated with oral penicillin. On examination, his temp is 38.7 C respiratory rate 20/m, and heart rate 110/m. His left wrist and right ankle are tender." },
            { system: "Neonatology", text: "A 6 day old newborn present with irritability, poor feeding, poor suckling, weak crying, RD and seizures. On examination he was lethargic, hypotonic. The anterior fontanel was bulging and tense, absent moro reflex and the abdomen was distended. His body temperature was 35 c. The mother gives a history of ICU admission immediately after birth. And maternal fever before delivery (or premature rupture of membranes 36 hours before delivery)." },
            { system: "Infection", text: "10-years-old patient calls his parents from summer camp to state that he has had fever, muscular pain (especially in the back), headache and malaise. He describes the area from the back of his mandible towards the mastoid space as being full and tender and that his ear lobe on the affected side appears to be sticking upward ad outwards. Drinking sour liquids causes much pain. When his father calls your office, you remind him that he had refused immunization for his child due to concerns regarding vaccine safety." },
            { system: "Endocrine", text: "An 11-year-old girl is admitted with drowsiness and difficulty breathing. She was well until 3 weeks previously, when she began feeling tired, thirsty and losing weight. On examination she responds only to pain. Her breath has an abnormal smell, is deep and rapid 25/m, her heart rate is 100/m and her temp is 36.8 C. She has cool peripheries and capillary refill time of 5 seconds." },
            { system: "Neonatology", text: "A Newborn infant delivered at 34 weeks gestation by vaginal delivery after 96 hours of ruptured membranes. His birth weight was 2 kg. A breast feed was attempted, but was unable to suckle and swallow properly. At the age of 6 hours, he developed frequent apneic episodes. On examination, the baby appears lethargic and hypotonic. His temperature is 35.8 C." },
            { system: "Hematology", text: "A 5 years old girl was noticed to be pale and lacking energy. She was complaining that her legs were aching. She had an ear infection with a high temperature that was slow to respond to antibiotics. On examination she is quite and pale. Her temp is 37.8C. She has a generalized lymphadenopathy. She is pale but not jaundiced. She has bruises on her shins, left and right upper arm. The liver is 4 c below the right costal margin and her spleen is palpable 2 cm below the left costal margin." },
            { system: "Neurology", text: "A 13-month-old male was born at term by difficult vaginal delivery and birth weight was 4200 gm. At 6 months of age, his head control was poor. He is not able to sit or stand. His height and weight are both between the 25-50th percentiles. Some primitive reflexes such as the asymmetric tonic neck reflex persist and he has increased muscle tone especially in his legs." }
        ];

        // ----- Diagnoses extracted from pages 66-76 (answers) -----
        const answerList = [
            "Duchenne Muscular Dystrophy (DMD)",                                    // 1
            "Nephrotic Syndrome (Minimal Change Disease)",                          // 2
            "Kwashiorkor (Protein-Energy Malnutrition)",                            // 3
            "Pyloric Stenosis",                                                      // 4
            "Immune Thrombocytopenic Purpura (ITP)",                                 // 5
            "Severe Dehydration due to Gastroenteritis with Hypovolemic Shock",      // 6
            "Cyanotic Congenital Heart Disease (e.g., Tetralogy of Fallot or Transposition of Great Arteries)", //7
            "Acute Hepatitis A",                                                      //8
            "Varicella (Chickenpox)",                                                 //9
            "Celiac Disease",                                                          //10
            "Infective Endocarditis",                                                  //11
            "Pulmonary Tuberculosis (TB)",                                             //12
            "Primary Nocturnal Enuresis",                                              //13
            "Congenital Hypothyroidism",                                               //14
            "Acute Asthma Exacerbation",                                               //15
            "Acute Pyelonephritis",                                                     //16
            "Meconium Aspiration Syndrome",                                             //17
            "Beta-Thalassemia Major",                                                   //18
            "Intussusception",                                                          //19
            "Glucose-6-Phosphate Dehydrogenase (G6PD) Deficiency with Hemolytic Anemia", //20
            "Portal Hypertension secondary to Neonatal Umbilical Sepsis",               //21
            "Tetralogy of Fallot",                                                       //22
            "Henoch-Schönlein Purpura (HSP)",                                            //23
            "Juvenile Idiopathic Arthritis (JIA)",                                       //24
            "Physiological Jaundice",                                                     //25
            "Croup (Laryngotracheobronchitis)",                                           //26
            "Biliary Atresia",                                                            //27
            "Measles",                                                                    //28
            "Guillain-Barré Syndrome (GBS)",                                              //29
            "Febrile Seizure",                                                            //30
            "Marasmus (Severe Protein-Energy Malnutrition)",                               //31
            "Constitutional Growth Delay",                                                //32
            "Systemic Lupus Erythematosus (SLE)",                                         //33
            "Immune Thrombocytopenic Purpura (ITP)",                                      //34
            "Roseola Infantum (Exanthem Subitum)",                                        //35
            "Meningococcemia (or Septic Shock)",                                          //36
            "Bacterial Meningitis",                                                        //37
            "Severe Gastroenteritis with Dehydration",                                     //38
            "Hemolytic Disease of the Newborn (e.g., ABO Incompatibility)",                //39
            "Congenital Diaphragmatic Hernia",                                             //40
            "Turner Syndrome",                                                              //41
            "Hypoxic-Ischemic Encephalopathy (HIE)",                                       //42
            "Ventricular Septal Defect (VSD) with Heart Failure",                          //43
            "Pathological Jaundice (e.g., due to ABO/Rh Incompatibility)",                  //44
            "Bronchiolitis",                                                                 //45
            "Pneumonia with Pleural Effusion",                                               //46
            "Anaphylaxis (Bee Sting Allergy)",                                               //47
            "Bacterial Pneumonia",                                                           //48
            "Respiratory Distress Syndrome (RDS) in Preterm Infant",                         //49
            "Kawasaki Disease with Coronary Artery Involvement",                             //50
            "Scarlet Fever",                                                                  //51
            "Iron Deficiency Anemia",                                                         //52
            "Transient Tachypnea of the Newborn (TTN)",                                       //53
            "Vitamin D Deficiency Rickets",                                                   //54
            "Hemophilia A or B",                                                              //55
            "Down Syndrome (Trisomy 21) with Congenital Heart Disease",                        //56
            "Pulmonary Tuberculosis (TB)",                                                     //57
            "Post-Streptococcal Glomerulonephritis (PSGN)",                                    //58
            "Acute Rheumatic Fever",                                                           //59
            "Neonatal Sepsis (Early-Onset)",                                                   //60
            "Mumps",                                                                           //61
            "Diabetic Ketoacidosis (DKA)",                                                     //62
            "Neonatal Sepsis (Late-Onset)",                                                    //63
            "Acute Lymphoblastic Leukemia (ALL)",                                              //64
            "Cerebral Palsy (Spastic Diplegia)"                                                //65
        ];

        // combine
        const fullCases = rawCases.map((c, idx) => ({
            ...c,
            diagnosis: answerList[idx] || "Diagnosis not available"
        }));

        // systems list
        const allSystems = [...new Set(fullCases.map(c => c.system))].sort();

        // ---------- app state ----------
        let currentFilterSystems = []; // empty = all
        let currentOrder = 'file'; // 'file' or 'shuffle'
        let shuffledIndices = [];
        let currentIdx = 0;
        let displayedCases = [];

        // timer
        let timerSeconds = 0;
        let timerInterval = null;
        let timerRunning = false;

        // DOM elements
        const caseTextDiv = document.getElementById('caseText');
        const caseCounterSpan = document.getElementById('caseCounter');
        const systemBadge = document.getElementById('systemBadge');
        const answerArea = document.getElementById('answerArea');
        const diagnosisSpan = document.getElementById('diagnosisAnswer');
        const showAnswerBtn = document.getElementById('showAnswerBtn');
        const hideAnswerBtn = document.getElementById('hideAnswerBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const systemFiltersDiv = document.getElementById('systemFilters');
        const shuffleBtn = document.getElementById('shuffleBtn');
        const fileOrderBtn = document.getElementById('fileOrderBtn');
        const startTimerBtn = document.getElementById('startTimerBtn');
        const resetTimerBtn = document.getElementById('resetTimerBtn');
        const timerDisplay = document.getElementById('timerDisplay');

        // helpers
        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2,'0');
            const s = (sec % 60).toString().padStart(2,'0');
            return `${m}:${s}`;
        }
        function updateTimerDisplay() { timerDisplay.innerText = formatTime(timerSeconds); }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerRunning = false;
        }
        function startTimer() {
            if (timerRunning) return;
            stopTimer();
            timerRunning = true;
            timerInterval = setInterval(() => {
                timerSeconds++;
                updateTimerDisplay();
            }, 1000);
        }
        function resetTimer() {
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
            timerRunning = false;
        }

        // generate filtered ordered list
        function updateDisplayedCases() {
            let filtered = fullCases;
            if (currentFilterSystems.length > 0) {
                filtered = fullCases.filter(c => currentFilterSystems.includes(c.system));
            }
            if (currentOrder === 'shuffle') {
                shuffledIndices = [...Array(filtered.length).keys()];
                for (let i = shuffledIndices.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledIndices[i], shuffledIndices[j]] = [shuffledIndices[j], shuffledIndices[i]];
                }
                displayedCases = shuffledIndices.map(i => filtered[i]);
            } else {
                displayedCases = filtered;
            }
            if (displayedCases.length === 0) {
                displayedCases = [{ text: "No cases match filter.", system: "", diagnosis: "" }];
            }
            if (currentIdx >= displayedCases.length) currentIdx = 0;
            renderCurrentCase();
        }

        function renderCurrentCase() {
            const c = displayedCases[currentIdx];
            caseTextDiv.innerText = c.text;
            // system badge hidden by default, store system in dataset
            systemBadge.classList.add('hidden');
            systemBadge.innerText = 'Show system';
            systemBadge.dataset.system = c.system || '';
            caseCounterSpan.innerText = `case ${currentIdx+1} / ${displayedCases.length}`;
            pageIndicator.innerText = `${currentIdx+1} / ${displayedCases.length}`;
            answerArea.classList.remove('show-answer');
        }

        // system badge click: reveal system
        systemBadge.addEventListener('click', (e) => {
            const sys = systemBadge.dataset.system;
            if (sys) {
                systemBadge.classList.remove('hidden');
                systemBadge.innerText = sys;
            }
        });

        // filter buttons
        function renderSystemButtons() {
            const allSelected = currentFilterSystems.length === 0;
            let html = `<button class="system-btn ${allSelected ? 'selected' : ''}" data-system="All">All</button>`;
            allSystems.forEach(sys => {
                const sel = currentFilterSystems.includes(sys);
                html += `<button class="system-btn ${sel ? 'selected' : ''}" data-system="${sys}">${sys}</button>`;
            });
            systemFiltersDiv.innerHTML = html;
            Array.from(document.querySelectorAll('.system-btn')).forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const sys = e.target.dataset.system;
                    if (sys === 'All') {
                        currentFilterSystems = [];
                    } else {
                        if (currentFilterSystems.includes(sys)) {
                            currentFilterSystems = currentFilterSystems.filter(s => s !== sys);
                        } else {
                            currentFilterSystems.push(sys);
                        }
                    }
                    renderSystemButtons();
                    currentIdx = 0;
                    updateDisplayedCases();
                });
            });
        }

        // event listeners
        showAnswerBtn.addEventListener('click', () => {
            if (displayedCases[currentIdx]?.diagnosis) {
                diagnosisSpan.innerText = displayedCases[currentIdx].diagnosis;
                answerArea.classList.add('show-answer');
            } else { diagnosisSpan.innerText = ''; }
        });
        hideAnswerBtn.addEventListener('click', () => {
            answerArea.classList.remove('show-answer');
        });
        function nextCase() {
            if (displayedCases.length === 0) return;
            if (currentIdx < displayedCases.length - 1) currentIdx++;
            else currentIdx = 0;
            renderCurrentCase();
        }
        function prevCase() {
            if (displayedCases.length === 0) return;
            if (currentIdx > 0) currentIdx--;
            else currentIdx = displayedCases.length - 1;
            renderCurrentCase();
        }
        nextBtn.addEventListener('click', nextCase);
        prevBtn.addEventListener('click', prevCase);

        shuffleBtn.addEventListener('click', () => {
            currentOrder = 'shuffle';
            shuffleBtn.classList.add('active');
            fileOrderBtn.classList.remove('active');
            currentIdx = 0;
            updateDisplayedCases();
        });
        fileOrderBtn.addEventListener('click', () => {
            currentOrder = 'file';
            fileOrderBtn.classList.add('active');
            shuffleBtn.classList.remove('active');
            currentIdx = 0;
            updateDisplayedCases();
        });

        startTimerBtn.addEventListener('click', () => {
            if (timerRunning) { stopTimer(); startTimerBtn.innerText = '▶ start'; }
            else { startTimer(); startTimerBtn.innerText = '⏸ pause'; }
        });
        resetTimerBtn.addEventListener('click', () => {
            stopTimer();
            timerSeconds = 0;
            updateTimerDisplay();
            startTimerBtn.innerText = '▶ start';
            timerRunning = false;
        });

        // init
        renderSystemButtons();
        updateDisplayedCases();
        resetTimer();
    })();
</script>
</body>
</html>
